[package]
name = "arama-cache"
version = "0.12.7"
edition = "2024"

description = "Image viewer and similarity calculator with offline AI power"
authors = ["nabbisen <nabbisen@scqr.net>"]
license = "Apache-2.0"

categories = ["gui"]
keywords = ["image", "walk", "filter"]
repository = "https://github.com/nabbisen/arama"
readme = "README.md"
rust-version = "1.90.0"

[dependencies]
arama-env = { workspace = true }
arama-repr = { workspace = true }
arama-sidecar = { workspace = true }
arama-storage = { workspace = true }

anyhow = { workspace = true }
ffmpeg-sidecar = { workspace = true }
image = { workspace = true }
rayon = { workspace = true }
r2d2 = { workspace = true }
r2d2_sqlite = { workspace = true }
rusqlite = { workspace = true }
sha2 = { workspace = true }
swdir = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
